app_name: pinguin
service_name: pinguin-api
image_repository: ghcr.io/tyemirov/pinguin
image_tag: latest
public_host: pinguin-api.mprlab.com
container_port: 8080
healthcheck_path: /healthz
gateway_target: pinguin
caddy_container_name: caddy2
caddy_config_path: /etc/caddy/Caddyfile
caddy:
  snippet_name: pinguin-api.caddy
  import_snippet: common_site
  dial_timeout: 10s
  response_header_timeout: 30s
  read_timeout: 80s
pages:
  enabled: true
  resources:
    - name: pinguin
      type: github_pages_make_target
      target: pages-deploy
      url: https://pinguin.mprlab.com/
      url_variable: mprlab_pinguin_pages_url
      source_marker_path: /pinguin-pages-build.json
      source_marker_field: sourceCommit
