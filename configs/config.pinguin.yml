server:
  databasePath: ${DATABASE_PATH}
  grpcAuthToken: ${GRPC_AUTH_TOKEN}
  logLevel: ${LOG_LEVEL}
  maxRetries: ${MAX_RETRIES}
  retryIntervalSec: ${RETRY_INTERVAL_SEC}
  masterEncryptionKey: ${MASTER_ENCRYPTION_KEY}
  connectionTimeoutSec: ${CONNECTION_TIMEOUT_SEC}
  operationTimeoutSec: ${OPERATION_TIMEOUT_SEC}
  tauth:
    signingKey: ${TAUTH_SIGNING_KEY}
    cookieName: ${TAUTH_COOKIE_NAME}

tenants:
  - id: tenant-local
    displayName: Local Sandbox
    supportEmail: support@mprlab.com
    enabled: true
    domains:
      - ${TENANT_LOCAL_DOMAIN_PRIMARY}
      - ${TENANT_LOCAL_DOMAIN_SECONDARY}
    admins:
      - ${TENANT_LOCAL_ADMIN_EMAIL_1}
      - ${TENANT_LOCAL_ADMIN_EMAIL_2}
    emailProfile:
      host: ${TENANT_LOCAL_SMTP_HOST}
      port: ${TENANT_LOCAL_SMTP_PORT}
      username: ${TENANT_LOCAL_SMTP_USERNAME}
      password: ${TENANT_LOCAL_SMTP_PASSWORD}
      fromAddress: ${TENANT_LOCAL_FROM_EMAIL}
    smsProfile:
      accountSid: ${TWILIO_ACCOUNT_SID}
      authToken: ${TWILIO_AUTH_TOKEN}
      fromNumber: ${TWILIO_FROM_NUMBER}

web:
  enabled: true
  listenAddr: ${HTTP_LISTEN_ADDR}
  allowedOrigins:
    - ${HTTP_ALLOWED_ORIGIN1}
    - ${HTTP_ALLOWED_ORIGIN2}
    - ${HTTP_ALLOWED_ORIGIN3}
  trustedProxies:
    - ${HTTP_TRUSTED_PROXY1}
    - ${HTTP_TRUSTED_PROXY2}
    - ${HTTP_TRUSTED_PROXY3}

smtpSubmission:
  enabled: ${SMTP_SUBMISSION_ENABLED}
  hostname: ${SMTP_SUBMISSION_HOSTNAME}
  listenAddr: ${SMTP_SUBMISSION_LISTEN_ADDR}
  tlsListenAddr: ${SMTP_SUBMISSION_TLS_LISTEN_ADDR}
  tlsCertPath: ${SMTP_SUBMISSION_TLS_CERT_PATH}
  tlsKeyPath: ${SMTP_SUBMISSION_TLS_KEY_PATH}
  publicPort: ${SMTP_SUBMISSION_PUBLIC_PORT}
  publicSecurityMode: ${SMTP_SUBMISSION_PUBLIC_SECURITY_MODE}
  deliveryMode: ${SMTP_SUBMISSION_DELIVERY_MODE}
  maxMessageBytes: ${SMTP_SUBMISSION_MAX_MESSAGE_BYTES}
  maxRecipients: ${SMTP_SUBMISSION_MAX_RECIPIENTS}
  allowInsecureAuth: ${SMTP_SUBMISSION_ALLOW_INSECURE_AUTH}
  relay:
    host: ${SMTP_SUBMISSION_RELAY_HOST}
    port: ${SMTP_SUBMISSION_RELAY_PORT}
    username: ${SMTP_SUBMISSION_RELAY_USERNAME}
    password: ${SMTP_SUBMISSION_RELAY_PASSWORD}

smtpForwarding:
  enabled: ${SMTP_FORWARDING_ENABLED}
  hostname: ${SMTP_FORWARDING_HOSTNAME}
  listenAddr: ${SMTP_FORWARDING_LISTEN_ADDR}
  maxMessageBytes: ${SMTP_FORWARDING_MAX_MESSAGE_BYTES}
  maxRecipients: ${SMTP_FORWARDING_MAX_RECIPIENTS}
  relay:
    host: ${SMTP_FORWARDING_RELAY_HOST}
    port: ${SMTP_FORWARDING_RELAY_PORT}
    username: ${SMTP_FORWARDING_RELAY_USERNAME}
    password: ${SMTP_FORWARDING_RELAY_PASSWORD}
