<!DOCTYPE html>
<html lang="en" data-theme="light" data-mpr-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Pinguin Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/MarcoPoloResearchLab/mpr-ui@latest/mpr-ui.css"
    />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <script defer src="/js/tauth-config.js"></script>
    <script defer src="/js/mpr-ui-auth-cache.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/gh/MarcoPoloResearchLab/mpr-ui@latest/mpr-ui-config.js"></script>
    <script
      id="mpr-ui-bundle"
      type="application/json"
      data-mpr-ui-bundle-src="https://cdn.jsdelivr.net/gh/MarcoPoloResearchLab/mpr-ui@latest/mpr-ui.js"
    ></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
      <script defer src="https://loopaware.mprlab.com/pixel.js?site_id=e8f235c8-ddf2-46b7-ae42-022885fe8a44"></script>
  </head>
  <body
    data-page="dashboard"
    x-data="appShell()"
    class="theme-light"
  >
    <mpr-header
      id="pinguin-dashboard-header"
      data-config-url="/config-ui.yaml"
      brand-label="Pinguin"
      brand-href="/"
      nav-links='[{ "label": "Docs", "href": "https://github.com/tyemirov/pinguin" }]'
      horizontal-links='{
        "alignment": "right",
        "links": [
          { "label": "Event log", "href": "#event-log" },
          { "label": "SMTP relay", "href": "#smtp-relay" }
        ]
      }'
    >
      <a slot="brand" class="pinguin-brand" href="/" aria-label="Pinguin home">
        <img class="pinguin-brand__mark" src="/favicon.svg" alt="" aria-hidden="true" />
        <span>Pinguin</span>
      </a>
    </mpr-header>
    <main class="anchor-section">
      <header class="dashboard-header">
        <div>
          <h1 x-text="strings.title"></h1>
          <p x-text="strings.subtitle"></p>
        </div>
        <div class="filters">
          <button
            class="button secondary"
            type="button"
            x-on:click="refreshNotifications()"
            x-text="actions.refresh"
          ></button>
        </div>
      </header>
      <section
        id="event-log"
        class="panel"
        aria-labelledby="event-log-title"
        x-data="notificationsTable()"
        data-testid="notifications-table"
      >
        <header class="panel-header">
          <div>
            <h2 id="event-log-title" class="section-title" x-text="strings.eventLogTitle"></h2>
            <p class="text-muted" x-text="strings.eventLogSubtitle"></p>
          </div>
        </header>
        <div class="filters" style="margin-bottom: 1rem">
          <label style="flex: 1; min-width: 220px">
            <span x-text="strings.tenantLabel"></span>
            <select
              x-model="selectedTenantId"
              x-on:change="changeTenant()"
              :disabled="isLoadingTenants || tenants.length === 0"
            >
              <template x-for="tenant in tenants" :key="tenant.id">
                <option :value="tenant.id" x-text="tenant.displayName"></option>
              </template>
            </select>
          </label>
          <label style="flex: 1; min-width: 200px">
            <span x-text="strings.searchLabel"></span>
            <input
              type="search"
              x-model="searchQuery"
              :placeholder="strings.searchPlaceholder"
              autocomplete="off"
            />
          </label>
          <label style="flex: 1; min-width: 200px">
            <span>Filter by status</span>
            <select x-model="statusFilter" x-on:change="loadNotifications()">
              <template x-for="option in STATUS_OPTIONS" :key="option.value">
                <option :value="option.value" x-text="option.label"></option>
              </template>
            </select>
          </label>
        </div>
        <p
          class="text-muted"
          x-cloak
          x-show="isLoadingTenants"
          x-text="strings.tenantLoading"
        ></p>
        <template x-if="errorMessage">
          <p class="notice" data-variant="error" x-text="errorMessage"></p>
        </template>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Notification</th>
                <th>Tenant</th>
                <th>Status</th>
                <th>Recipient</th>
                <th>Scheduled for</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <template x-if="isLoading">
                <tr>
                  <td colspan="6" class="empty-state">
                    Loading notifications…
                  </td>
                </tr>
              </template>
              <template x-if="!isLoading && notifications.length === 0">
                <tr>
                  <td
                    colspan="6"
                    class="empty-state"
                    x-text="strings.emptyState"
                  ></td>
                </tr>
              </template>
              <template x-for="item in notifications" :key="item.id">
                <tr data-testid="notification-row">
                  <td>
                    <strong
                      x-text="item.subject || 'Untitled notification'"
                    ></strong>
                    <p class="text-muted">
                      Created
                      <span x-text="formatTimestamp(item.createdAt)"></span>
                    </p>
                  </td>
                  <td x-text="item.tenantId || '—'"></td>
                  <td>
                    <span
                      class="status-badge"
                      :data-variant="item.status"
                      x-text="formatStatus(item.status)"
                    ></span>
                  </td>
                  <td>
                    <span x-text="item.recipient"></span>
                  </td>
                  <td x-text="formatTimestamp(item.scheduledFor)"></td>
                  <td style="min-width: 220px">
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap">
                      <button
                        class="button secondary"
                        type="button"
                        x-on:click="openScheduleDialog(item)"
                        :disabled="item.status !== 'queued'"
                        x-text="actions.reschedule"
                      ></button>
                      <button
                        class="button danger"
                        type="button"
                        x-on:click="cancelNotification(item)"
                        :disabled="item.status !== 'queued'"
                        x-text="actions.cancel"
                      ></button>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
        <div
          class="table-scroll-sentinel"
          x-ref="scrollSentinel"
          data-testid="notification-scroll-sentinel"
          aria-hidden="true"
        ></div>
        <p
          class="text-muted table-page-status"
          x-cloak
          x-show="isLoadingMore"
          x-text="strings.loadingMore"
        ></p>
        <p
          class="text-muted table-page-status"
          x-cloak
          x-show="hasLoadedNotifications && notifications.length > 0 && !nextCursor && !isLoadingMore"
          x-text="strings.endOfResults"
        ></p>
        <dialog class="dialog" x-ref="scheduleDialog">
          <form class="dialog__body" x-on:submit.prevent="submitSchedule">
            <div>
              <h3 x-text="strings.scheduleDialogTitle"></h3>
              <p
                class="text-muted"
                x-text="strings.scheduleDialogDescription"
              ></p>
            </div>
            <label>
              <span>Delivery time</span>
              <input
                type="datetime-local"
                x-model="scheduleForm.scheduledTime"
                required
              />
            </label>
            <div style="display: flex; gap: 0.75rem; justify-content: flex-end">
              <button
                class="button secondary"
                type="button"
                x-on:click="closeScheduleDialog()"
                x-text="actions.close"
              ></button>
              <button
                class="button primary"
                type="submit"
                x-text="actions.saveChanges"
              ></button>
            </div>
          </form>
        </dialog>
      </section>
      <section
        id="smtp-relay"
        class="panel"
        aria-labelledby="smtp-relay-title"
        x-data="smtpIdentities()"
        data-testid="smtp-identities"
      >
        <header class="panel-header">
          <div>
            <h2 id="smtp-relay-title" class="section-title" x-text="strings.title"></h2>
            <p class="text-muted" x-text="strings.subtitle"></p>
          </div>
        </header>
        <form class="identity-form" x-on:submit.prevent="createIdentity">
          <label>
            <span x-text="strings.emailLabel"></span>
            <input
              type="email"
              x-model="emailAddress"
              :placeholder="strings.emailPlaceholder"
              autocomplete="email"
              :readonly="Boolean(editingIdentityId)"
              :aria-readonly="Boolean(editingIdentityId)"
              required
            />
          </label>
          <label class="identity-form__wide">
            <span x-text="strings.forwardToLabel"></span>
            <textarea
              x-model="forwardToText"
              :placeholder="strings.forwardToPlaceholder"
              rows="2"
              required
            ></textarea>
          </label>
          <button
            class="button primary"
            type="submit"
            :disabled="isSubmitting"
            x-text="editingIdentityId ? actions.saveChanges : actions.create"
          ></button>
          <button
            class="button secondary"
            type="button"
            x-show="editingIdentityId"
            x-on:click="cancelForwardingEdit()"
            x-text="strings.cancelEditLabel"
          ></button>
        </form>
        <template x-if="errorMessage">
          <p class="notice" data-variant="error" x-text="errorMessage"></p>
        </template>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th x-text="strings.emailLabel"></th>
                <th x-text="strings.usernameLabel"></th>
                <th x-text="strings.forwardToDisplayLabel"></th>
                <th x-text="strings.lastUsedLabel"></th>
                <th x-text="strings.actionColumn"></th>
              </tr>
            </thead>
            <tbody>
              <template x-if="isLoading">
                <tr>
                  <td colspan="5" class="empty-state" x-text="strings.loadingState"></td>
                </tr>
              </template>
              <template x-if="!isLoading && identities.length === 0">
                <tr>
                  <td colspan="5" class="empty-state" x-text="strings.emptyState"></td>
                </tr>
              </template>
              <template x-for="identity in identities" :key="identity.id">
                <tr data-testid="smtp-identity-row">
                  <td>
                    <strong x-text="identity.emailAddress"></strong>
                  </td>
                  <td x-text="identity.username"></td>
                  <td x-text="identity.forwardTo.join(', ')"></td>
                  <td x-text="formatTimestamp(identity.lastUsedAt)"></td>
                  <td style="min-width: 180px">
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap">
                      <button
                        class="button secondary"
                        type="button"
                        x-on:click="editForwarding(identity)"
                        :disabled="isSubmitting"
                        x-text="strings.editForwardingLabel"
                      ></button>
                      <button
                        class="button secondary"
                        type="button"
                        x-on:click="rotateIdentity(identity)"
                        :disabled="isSubmitting"
                        x-text="actions.rotate"
                      ></button>
                      <button
                        class="button danger"
                        type="button"
                        x-on:click="deleteIdentity(identity)"
                        :disabled="isSubmitting"
                        x-text="actions.delete"
                      ></button>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
        <dialog class="dialog dialog--credentials" x-ref="credentialsDialog">
          <form class="dialog__body" method="dialog">
            <header class="dialog__header">
              <h3 x-text="strings.credentialsTitle"></h3>
              <p class="text-muted" x-text="strings.credentialsDescription"></p>
              <button
                class="dialog__close"
                type="button"
                :aria-label="strings.credentialsCloseLabel"
                :title="strings.credentialsCloseLabel"
                x-on:click="closeCredentialsDialog()"
              >
                <span aria-hidden="true">X</span>
              </button>
            </header>
            <template x-if="credentials">
              <div class="credentials-grid" data-testid="smtp-credentials">
                <p
                  class="notice credential-notice credentials-grid__full"
                  role="status"
                  aria-live="polite"
                  data-testid="smtp-credential-notice"
                  :data-variant="credentialNotice ? credentialNotice.variant : 'info'"
                  x-cloak
                  x-show="credentialNotice"
                  x-text="credentialNotice ? credentialNotice.message : ''"
                ></p>
                <label>
                  <span x-text="strings.hostLabel"></span>
                  <span class="copy-field">
                    <input type="text" readonly aria-readonly="true" :value="credentials.smtpSettings.host" />
                    <button
                      class="copy-field__button"
                      type="button"
                      :aria-label="strings.hostCopyLabel"
                      :title="strings.hostCopyLabel"
                      x-on:click="copyCredentialValue(credentials.smtpSettings.host, strings.hostCopySuccess)"
                    >
                      <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                        <path d="M8 7h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2Z"></path>
                        <path d="M5 15H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"></path>
                      </svg>
                    </button>
                  </span>
                </label>
                <label>
                  <span x-text="strings.portLabel"></span>
                  <input type="text" readonly aria-readonly="true" :value="credentials.smtpSettings.port" />
                </label>
                <label>
                  <span x-text="strings.securityLabel"></span>
                  <input type="text" readonly aria-readonly="true" :value="credentials.smtpSettings.securityMode" />
                </label>
                <label>
                  <span x-text="strings.usernameLabel"></span>
                  <span class="copy-field">
                    <input type="text" readonly aria-readonly="true" :value="credentials.username" />
                    <button
                      class="copy-field__button"
                      type="button"
                      :aria-label="strings.usernameCopyLabel"
                      :title="strings.usernameCopyLabel"
                      x-on:click="copyCredentialValue(credentials.username, strings.usernameCopySuccess)"
                    >
                      <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                        <path d="M8 7h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2Z"></path>
                        <path d="M5 15H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"></path>
                      </svg>
                    </button>
                  </span>
                </label>
                <label class="credentials-grid__full">
                  <span x-text="strings.passwordLabel"></span>
                  <span class="copy-field">
                    <input type="text" readonly aria-readonly="true" :value="credentials.password" />
                    <button
                      class="copy-field__button"
                      type="button"
                      :aria-label="strings.passwordCopyLabel"
                      :title="strings.passwordCopyLabel"
                      x-on:click="copyCredentialValue(credentials.password, strings.passwordCopySuccess)"
                    >
                      <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                        <path d="M8 7h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2Z"></path>
                        <path d="M5 15H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"></path>
                      </svg>
                    </button>
                  </span>
                </label>
              </div>
            </template>
          </form>
        </dialog>
      </section>
    </main>
    <div
      class="toast-center"
      x-data="toastCenter()"
      x-init="init()"
      aria-live="polite"
    >
      <template x-for="toast in toasts" :key="toast.id">
        <button
          type="button"
          class="toast"
          :data-variant="toast.variant"
          x-on:click="dismissToast(toast.id)"
          x-text="toast.message"
        ></button>
      </template>
    </div>
    <script type="module" src="/js/bootstrap.js"></script>
    <mpr-footer
      id="dashboard-footer"
      prefix-text="Pinguin Notification Service"
      privacy-link-label="Privacy &amp; Terms"
      privacy-modal-content="
        <h1>Privacy Policy — Pinguin</h1>
        <p>Pinguin stores the notification drafts you create, recipient details, and delivery metadata solely to run the scheduling workspace.</p>
        <p>Authentication happens through Google Sign-In; we issue HttpOnly session cookies and never store your password.</p>
        <p>We do not sell or share notification content with third parties, and you may remove queued items from the dashboard at any time.</p>
      "
      links-collection='{"style":"drop-up","text":"Explore","links":[{ "label": "Repository", "url": "https://github.com/tyemirov/pinguin" },{ "label": "mpr-ui docs", "url": "https://github.com/MarcoPoloResearchLab/mpr-ui" }]}'
      theme-switcher="toggle"
      theme-config='{"attribute":"data-theme","targets":["body"],"modes":[{"value":"light","attributeValue":"light","classList":["theme-light"]},{"value":"dark","attributeValue":"dark","classList":["theme-dark"]}]}'
    ></mpr-footer>
  </body>
</html>
