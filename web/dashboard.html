<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=/event-log.html" />
    <link rel="canonical" href="/event-log.html" />
    <title>Pinguin Dashboard Redirect</title>
    <script>
      (() => {
        const destination =
          window.location.hash === '#smtp-relay' ? '/smtp-relay.html' : '/event-log.html';
        const target = new URL(destination, window.location.origin);
        target.search = window.location.search;
        window.location.replace(target.toString());
      })();
    </script>
  </head>
  <body>
    <main>
      <h1>Pinguin dashboard moved</h1>
      <p>
        Continue to <a href="/event-log.html">Event log</a> or
        <a href="/smtp-relay.html">SMTP relay</a>.
      </p>
    </main>
  </body>
</html>
